    <style>
      * {
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: #414e58;
        color: #fff;

        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* HEADER */
      .header {
        padding: 15px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .header svg{
        transform: scale(2);
        transform-origin: left center;
      }
      .header img {
        /* height: 62px; */
        width: 200px;
      }

      /* PAGE */
      .container {
        padding: 40px;
        flex: 1;
      }

      /* TABS */
      .tabs {
        display: flex;
        gap: 15px;
      }

      .tab {
        position: relative;
        padding: 14px 20px;
        background: #ffffff;
        color: #414e58;
        border-radius: 10px 10px 0 0;
        cursor: pointer;
        font-weight: bold;
        font-size: 16.5px;
      }

      .tab.active {
        background: #ffffff;
      }

      .tab.active::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -3px;
        width: 100%;
        height: 4px;
        background: #ef6a00;
        border-radius: 2px;
      }

      /* CONTENT */
      .content-wrapper {
        background: #ffffff;
        padding: 30px;
        border-radius: 0 0px 15px 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        min-height: calc(100vh - 260px);
      }

      /* TAB CONTENT */
      .tab-content {
        display: none;
        animation: fadeSlide 0.35s ease;
      }

      .tab-content.active {
        display: block;
      }

      @keyframes fadeSlide {
        from {
          opacity: 0;
          transform: translateY(12px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* GRID */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 20px;
        max-width: 100%;
      }

      .card {
        background: #ef6a00;
        padding: 0px;
        text-align: center;
        border-radius: 12px;
        font-weight: bold;
        /* width: 240px; */
      }

      .card a {
        text-decoration: none;
        color: #fff;
        padding: 20px 30px;
        display: inline-block;
        width: 100%;
      }

      footer {
        margin-top: auto;
        text-align: center;
        font-size: 12px;
        color: #777;
        padding: 15px 0;
      }
      h2{
        color: #414e58;
      }
    </style>
  </head>

    <script>
      document.getElementById("year").innerHTML = new Date().getFullYear();

      function openTab(tabId, el) {
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".tab-content")
          .forEach((c) => c.classList.remove("active"));

        el.classList.add("active");
        document.getElementById(tabId).classList.add("active");
      }
    </script>
